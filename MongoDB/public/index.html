<!DOCTYPE html>
<html lang="en">
<head>
    <title>User Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="max-w-4xl mx-auto mt-10 bg-white p-8 rounded-2xl shadow-lg">

    <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">
        User Registration Form
    </h2>

    <form action="/add-user" method="POST" class="grid grid-cols-2 gap-6">

        <!-- Full Name -->
        <div>
            <label class="block text-sm font-medium text-gray-600">Full Name</label>
            <input type="text" name="name" required
                class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>

        <!-- Age -->
        <div>
            <label class="block text-sm font-medium text-gray-600">Age</label>
            <input type="number" name="age"
                class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>

        <!-- Email -->
        <div>
            <label class="block text-sm font-medium text-gray-600">Email</label>
            <input type="email" name="email" required
                class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>

        <!-- Phone -->
        <div>
            <label class="block text-sm font-medium text-gray-600">Phone</label>
            <input type="text" name="phone"
                class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>

        <!-- City -->
        <div>
            <label class="block text-sm font-medium text-gray-600">City</label>
            <input type="text" name="city"
                class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>

        <!-- Occupation -->
        <div>
            <label class="block text-sm font-medium text-gray-600">Occupation</label>
            <input type="text" name="occupation"
                class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>

        <!-- Salary -->
        <div>
            <label class="block text-sm font-medium text-gray-600">Salary</label>
            <input type="number" name="salary"
                class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>

        <!-- Gender -->
        <div>
            <label class="block text-sm font-medium text-gray-600">Gender</label>
            <select name="gender"
                class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <!-- Address (Full width) -->
        <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-600">Address</label>
            <textarea name="address"
                class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"></textarea>
        </div>

        <!-- Married -->
        <div class="col-span-2 flex items-center gap-2">
            <input type="checkbox" name="married">
            <label class="text-sm text-gray-600">Married</label>
        </div>

        <!-- Submit -->
        <div class="col-span-2 text-center">
            <button type="submit"
                class="bg-green-500 text-white px-6 py-2 rounded-lg hover:bg-green-600 transition">
                Submit
            </button>
        </div>
    </form>

    <!-- Divider -->
    <hr class="my-8">

    <!-- Delete Section -->
    <h2 class="text-xl font-bold mb-4 text-gray-700 text-center">
        Delete User
    </h2>

    <form action="/delete-user" method="POST" class="flex gap-4 justify-center">
        <input type="email" name="email" placeholder="Enter Email"
            class="p-2 border rounded-lg w-1/2 focus:outline-none focus:ring-2 focus:ring-red-400">
        
        <button type="submit"
            class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">
            Delete
        </button>
    </form>

</div>

</body>
</html>
