<!DOCTYPE html>
<html lang="en">
<head>
    <title>Blog System</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f4f4;
        }

        .container{
            display:flex;
            width:95%;
            max-width:1100px;
            background:white;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .left, .right{
            flex:1;
            padding:15px;
        }

        h2{
            font-size:16px;
            margin-bottom:8px;
        }

        input, textarea, button{
            width:100%;
            padding:8px;
            margin:5px 0;
            font-size:13px;
        }

        textarea{
            resize:none;
            height:60px;
        }

        button{
            background:#4CAF50;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#45a049;
        }

        .section{
            margin-bottom:12px;
        }

        hr{
            margin:10px 0;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">

        <!-- ADD POST -->
        <div class="section">
            <h2>Add Blog Post</h2>

            <form action="/posts/add" method="POST">
                <input type="text" name="title" placeholder="Post Title" required>
                <textarea name="content" placeholder="Post Content" required></textarea>
                <button type="submit">Add Post</button>
            </form>
        </div>

        <hr>

        <!-- VIEW SINGLE POST (dynamic concept revision) -->
        <div class="section">
            <h2>View Post by ID</h2>

            <form action="/posts/" method="GET" onsubmit="this.action='/posts/'+this.postId.value">
                <input type="number" name="postId" placeholder="Enter Post ID">
                <button type="submit">View Post</button>
            </form>
        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <!-- ACTIONS -->
        <div class="section">
            <h2>Actions</h2>

            <form action="/posts" method="GET">
                <button>View All Posts</button>
            </form>

            <form action="/stats" method="GET">
                <button>System Stats</button>
            </form>

            <form action="/posts/delete/" method="GET" onsubmit="this.action='/posts/delete/'+this.delId.value">
                <input type="number" name="delId" placeholder="Delete Post ID">
                <button>Delete Post</button>
            </form>

        </div>

    </div>

</div>

</body>
</html>
