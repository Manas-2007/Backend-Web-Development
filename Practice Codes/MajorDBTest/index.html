<!DOCTYPE html>
<html>
<head>
    <title>Student Profile Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-500 to-purple-600 min-h-screen flex items-center justify-center p-6">

<div class="bg-white w-full max-w-3xl p-8 rounded-2xl shadow-2xl">

    <h2 class="text-3xl font-bold text-center text-gray-700 mb-6">
        Student Profile Form
    </h2>

    <form action="/register" method="POST" class="grid grid-cols-2 gap-4">

        <!-- Full Name -->
        <input type="text" name="name" placeholder="Full Name" required
        class="col-span-2 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">

        <!-- Email -->
        <input type="email" name="email" placeholder="Email" required
        class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">

        <!-- Phone -->
        <input type="text" name="phone" placeholder="Phone Number" required
        class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">

        <!-- Age -->
        <input type="number" name="age" placeholder="Age" required
        class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">

        <!-- Gender -->
        <select name="gender" required
        class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <!-- Course -->
        <input type="text" name="course" placeholder="Course" required
        class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">

        <!-- Address -->
        <textarea name="address" placeholder="Address" required
        class="col-span-2 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>

        <!-- Skills -->
        <input type="text" name="skills" placeholder="Skills (e.g. HTML, JS)"
        class="col-span-2 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">

        <!-- Submit -->
        <button type="submit"
        class="col-span-2 bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
            Register Student
        </button>

    </form>

</div>

</body>
</html>
