<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen flex items-center justify-center bg-gradient-to-br from-indigo-500 to-purple-600">

    <div class="bg-white w-[350px] p-8 rounded-2xl shadow-2xl text-center">

        <h2 class="text-2xl font-bold text-gray-700 mb-6">
            Student Registration
        </h2>

        <form action="/student" method="POST" class="space-y-4">

            <input type="text" name="name" placeholder="Enter Name" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">

            <input type="email" name="email" placeholder="Enter Email" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">

            <input type="number" name="age" placeholder="Enter Age" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">

            <input type="text" name="course" placeholder="Enter Course" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">

            <button type="submit"
            class="w-full bg-indigo-500 text-white py-2 rounded-lg hover:bg-indigo-600 transition duration-300">
                Submit
            </button>

        </form>

    </div>

</body>
</html>
