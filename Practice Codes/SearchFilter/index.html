<!DOCTYPE html>
<html>
<head>
    <title>User Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-400 to-purple-500 min-h-screen flex flex-col items-center p-6">

    <!-- 🔍 Search Bar -->
    <div class="w-full max-w-2xl mb-6">
        <form action="/search" method="GET" class="flex gap-2">
            <input 
                type="text" 
                name="name" 
                placeholder="🔍 Search registered users..." 
                class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-blue-500"
            >
            <button class="bg-blue-600 text-white px-4 rounded-lg hover:bg-blue-700">
                Search
            </button>
        </form>
    </div>

    <!-- 🧾 Registration Form -->
    <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-2xl">

        <h2 class="text-2xl font-bold text-center text-gray-700 mb-4">
            Register User
        </h2>

        <form action="/register" method="POST" class="space-y-4">

            <!-- Client ID -->
            <input 
                type="text" 
                name="clientId" 
                placeholder="Client ID" 
                required
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
            >

            <!-- Username -->
            <input 
                type="text" 
                name="username" 
                placeholder="Username" 
                required
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
            >

            <!-- Password -->
            <input 
                type="password" 
                name="password" 
                placeholder="Password" 
                required
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
            >

            <!-- Date of Birth -->
            <input 
                type="date" 
                name="dob" 
                required
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
            >

            <!-- Gender -->
            <select 
                name="gender" 
                required
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
            >
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <!-- Submit -->
            <button 
                type="submit"
                class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition"
            >
                Register
            </button>

        </form>

    </div>

</body>
</html>
